name: Keep Supabase Alive

on:
  schedule:
    - cron: '0 0 */5 * *'
  workflow_dispatch:

jobs:
  ping-supabase:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Supabase
        run: |
          body=$(curl -s -w "\nHTTP_STATUS:%{http_code}" \
            -X GET "${{ secrets.SUPABASE_URL }}/rest/v1/" \
            -H "apikey: ${{ secrets.SUPABASE_ANON_KEY }}" \
            -H "Authorization: Bearer ${{ secrets.SUPABASE_ANON_KEY }}" \
            -H "Content-Type: application/json" \
            || echo "\nHTTP_STATUS:000")
          response=$(echo "$body" | grep "HTTP_STATUS" | cut -d: -f2)
          echo "Response body: $(echo "$body" | grep -v HTTP_STATUS)"
          echo "Response: HTTP $response"
          if [ "$response" -lt 200 ] || [ "$response" -ge 300 ]; then
            echo "Connection failed - could not reach Supabase (HTTP $response)"
            exit 1
          fi
          echo "Ping successful - project is alive"