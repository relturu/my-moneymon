name: Keep Supabase Alive

on:
  schedule:
    - cron: '0 0 */5 * *'
  workflow_dispatch:

jobs:
  ping-supabase:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Supabase
        run: |
          response=$(curl -s -o /dev/null -w "%{http_code}" \
            -X GET "https://ivdaybeswzlddcyblkot.supabase.co/auth/v1/health" \
            || echo "000")
          echo "Response: HTTP $response"
          if [ "$response" -lt 200 ] || [ "$response" -ge 300 ]; then
            echo "Connection failed - could not reach Supabase (HTTP $response)"
            exit 1
          fi
          echo "Ping successful - project is alive"