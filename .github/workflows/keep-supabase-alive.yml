name: Keep Supabase Alive

on:
  schedule:
    - cron: '0 0 */5 * *'
  workflow_dispatch:

jobs:
  ping-supabase:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Supabase
        run: |
          response=$(curl -s -o /dev/null -w "%{http_code}" \
            -X GET "${{ secrets.SUPABASE_URL }}/rest/v1/" \
            -H "apikey: ${{ secrets.SUPABASE_ANON_KEY }}" \
            -H "Content-Type: application/json")
          echo "Response: HTTP $response"
          if [ "$response" -eq 000 ]; then
            echo "Connection failed - could not reach Supabase"
            exit 1
          fi
          echo "Ping successful - project is alive"