name: Keep Supabase Alive

on:
  schedule:
    - cron: '0 0 */5 * *'
  workflow_dispatch:

jobs:
  ping-supabase:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Supabase
        run: |
          response=$(curl -s -o /dev/null -w "%{http_code}" \
            -X GET "https://ivdaybeswzlddcyblkot.supabase.co/rest/v1/categories?limit=1" \
            -H "apikey: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}" \
            -H "Authorization: Bearer ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}" \
            || echo "000")
          echo "Response: HTTP $response"
          if [ "$response" = "000" ]; then
            echo "Could not reach Supabase at all"
            exit 1
          fi
          echo "Ping successful - database queried, project is alive (HTTP $response)"